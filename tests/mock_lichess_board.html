<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Mock Lichess</title>
<style>
  .cg-wrap { width: 400px; height: 400px; position: relative; }
  cg-board { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; background: #ccc; }
  square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; position: relative; }
  square.light { background: #f0d9b5; }
  square.dark { background: #b58863; }
  square.selected { outline: 3px solid yellow; }
  square.last-move { background: rgba(155, 199, 0, 0.41); }
  square .piece { font-size: 36px; line-height: 50px; text-align: center; user-select: none; pointer-events: none; }
  .rclock { padding: 10px; border: 1px solid #ccc; }
  .rclock.running { background: #e8f5e9; }
  .rclock-white { color: #000; }
  .rclock-black { color: #000; }
  .game-over { background: #fff; border: 2px solid red; padding: 20px; }
  .result { font-size: 18px; }
  .draw-offer { background: #fff; border: 1px solid blue; padding: 10px; }
  .promotion-choice { background: #fff; border: 1px solid green; padding: 10px; }
</style>
</head>
<body>
<div id="board-container">
  <div class="cg-wrap cgv1 orientation-white manipulable">
    <cg-board id="board">
    </cg-board>
  </div>
  <div id="clocks">
    <div class="rclock rclock-bottom rclock-white running"><span class="time">10:00</span></div>
    <div class="rclock rclock-top rclock-black"><span class="time">10:00</span></div>
  </div>
  <div id="status"></div>
</div>
<script>
  const UNICODE_PIECES = {
    'K': '\u2654', 'Q': '\u2655', 'R': '\u2656', 'B': '\u2657', 'N': '\u2658', 'P': '\u2659',
    'k': '\u265A', 'q': '\u265B', 'r': '\u265C', 'b': '\u265D', 'n': '\u265E', 'p': '\u265F'
  };
  const INITIAL_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR';

  function fenToPieces(fen) {
    const placement = fen.split(' ')[0];
    const pieces = [];
    for (const ch of placement) {
      if (ch === '/') continue;
      if (ch >= '1' && ch <= '8') {
        for (let i = 0; i < parseInt(ch); i++) pieces.push(null);
      } else {
        pieces.push(ch);
      }
    }
    return pieces;
  }

  function renderBoard(fen) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    const pieces = fenToPieces(fen);
    const isWhite = document.querySelector('.cg-wrap').classList.contains('orientation-white');
    for (let i = 0; i < 64; i++) {
      const file = i % 8;
      const rank = Math.floor(i / 8);
      const sq = document.createElement('square');
      const isLight = (file + rank) % 2 === 0;
      sq.className = isLight ? 'light' : 'dark';
      const displayRank = isWhite ? 8 - rank : rank + 1;
      const displayFile = isWhite ? String.fromCharCode(97 + file) : String.fromCharCode(104 - file);
      sq.dataset.coord = displayFile + displayRank;
      if (pieces[i]) {
        const p = document.createElement('span');
        p.className = 'piece';
        p.textContent = UNICODE_PIECES[pieces[i]];
        sq.appendChild(p);
      }
      board.appendChild(sq);
    }
  }

  function getPieceMap() {
    const map = {};
    document.querySelectorAll('square').forEach(sq => {
      const coord = sq.dataset.coord;
      const pieceEl = sq.querySelector('.piece');
      if (pieceEl) {
        const ch = pieceEl.textContent;
        for (const [key, val] of Object.entries(UNICODE_PIECES)) {
          if (val === ch) { map[coord] = key; break; }
        }
      } else {
        map[coord] = null;
      }
    });
    return map;
  }

  function piecesToFen(pieceMap) {
    const isWhite = document.querySelector('.cg-wrap').classList.contains('orientation-white');
    const ranks = [];
    for (let r = 0; r < 8; r++) {
      const displayRank = isWhite ? 8 - r : r + 1;
      const row = [];
      for (let f = 0; f < 8; f++) {
        const displayFile = isWhite ? String.fromCharCode(97 + f) : String.fromCharCode(104 - f);
        const coord = displayFile + displayRank;
        row.push(pieceMap[coord] || '-');
      }
      ranks.push(row);
    }
    const fenRanks = ranks.map(row => {
      let s = '';
      let empty = 0;
      for (const p of row) {
        if (p === '-') { empty++; }
        else { if (empty) { s += empty; empty = 0; } s += p; }
      }
      if (empty) s += empty;
      return s;
    });
    const turn = document.querySelector('.rclock-white.running') ? 'w' : 'b';
    return fenRanks.join('/') + ' ' + turn + ' KQkq - 0 1';
  }

  window.applyMove = function(uci) {
    const source = uci.slice(0, 2);
    const dest = uci.slice(2, 4);
    const srcSq = document.querySelector(`square[data-coord="${source}"]`);
    const dstSq = document.querySelector(`square[data-coord="${dest}"]`);
    if (!srcSq || !dstSq) return false;

    const pieceEl = srcSq.querySelector('.piece');
    const captured = dstSq.querySelector('.piece');
    if (captured) captured.remove();
    if (pieceEl) dstSq.appendChild(pieceEl);

    document.querySelectorAll('square.last-move').forEach(s => s.classList.remove('last-move'));
    srcSq.classList.add('last-move');
    dstSq.classList.add('last-move');

    window.clearSelected();
    window.toggleTurn();
    return true;
  };

  window.getBoardFen = function() {
    return piecesToFen(getPieceMap()).split(' ')[0];
  };

  window.getBoardState = function() {
    return piecesToFen(getPieceMap());
  };

  window.setBoardState = function(fen) {
    renderBoard(fen || INITIAL_FEN);
  };

  window.toggleTurn = function() {
    const clocks = document.querySelectorAll('.rclock');
    clocks.forEach(c => c.classList.remove('running'));
    const currentWhite = document.querySelector('.rclock-white.running');
    if (currentWhite) {
      document.querySelector('.rclock-black').classList.add('running');
    } else {
      document.querySelector('.rclock-white').classList.add('running');
    }
  };

  window.setOrientation = function(ori) {
    const wrap = document.querySelector('.cg-wrap');
    wrap.classList.remove('orientation-white', 'orientation-black');
    wrap.classList.add('orientation-' + ori);
    const pieces = getPieceMap();
    renderBoard('8/8/8/8/8/8/8/8');
    const fen = piecesToFen(pieces);
    renderBoard(fen.split(' ')[0]);
  };

  window.setTurn = function(color) {
    const clocks = document.querySelectorAll('.rclock');
    clocks.forEach(c => c.classList.remove('running'));
    document.querySelector('.rclock-' + color).classList.add('running');
  };

  window.showGameOver = function(show) {
    var el = document.querySelector('.game-over');
    if (show && !el) {
      var go = document.createElement('div');
      go.className = 'game-over';
      go.innerHTML = '<div class="result">1-0</div>';
      document.getElementById('board-container').appendChild(go);
    } else if (!show && el) {
      el.remove();
    }
  };

  window.showDrawOffer = function(show) {
    var el = document.querySelector('.draw-offer');
    if (show && !el) {
      var d = document.createElement('div');
      d.className = 'draw-offer';
      d.innerHTML = '<button>Decline</button>';
      document.getElementById('board-container').appendChild(d);
    } else if (!show && el) {
      el.remove();
    }
  };

  window.addLastMove = function(coords) {
    document.querySelectorAll('square.last-move').forEach(s => s.classList.remove('last-move'));
    coords.forEach(c => {
      document.querySelector('square[data-coord="' + c + '"]').classList.add('last-move');
    });
  };

  window.clearSelected = function() {
    document.querySelectorAll('square.selected').forEach(s => s.classList.remove('selected'));
  };

  renderBoard(INITIAL_FEN);

  document.addEventListener('click', function(e) {
    var sq = e.target.closest('square');
    if (!sq) return;
    var prev = document.querySelector('square.selected');
    if (prev && prev !== sq) {
      var src = prev.dataset.coord;
      var dst = sq.dataset.coord;
      window.applyMove(src + dst);
    } else if (prev === sq) {
      sq.classList.remove('selected');
    } else {
      sq.classList.add('selected');
    }
  });
</script>
</body>
</html>
